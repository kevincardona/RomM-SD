<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background: deep space purple-black radial -->
    <radialGradient id="bg" cx="50%" cy="42%" r="68%">
      <stop offset="0%" stop-color="#18103c"/>
      <stop offset="100%" stop-color="#07070f"/>
    </radialGradient>
    <!-- Subtle centre glow behind controller -->
    <radialGradient id="cg" cx="50%" cy="53%" r="38%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <!-- Controller body: dark blue-black gradient top→bottom -->
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f1b46"/>
      <stop offset="100%" stop-color="#0d0c1e"/>
    </linearGradient>
    <!-- Neon cyan glow (applied to stroke-only paths) -->
    <filter id="neon" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"  result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Softer glow for detail elements -->
    <filter id="sg" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Background ─────────────────────────────────── -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#cg)"/>

  <!--
    Controller outline path — single closed shape.
    Body spans x 76–436, y 150–380; grips taper in at bottom;
    centre gap 195–317 at y 308.
    Corner radii ≈ 44 px (body), 36 px (grip outer), 10 px (gap inner).
  -->
  <!-- Filled shape (no stroke — just dark body colour) -->
  <path fill="url(#body)"
    d="M120,150 L392,150 Q436,150 436,194
       L436,346 Q436,380 400,380
       L353,380 Q317,380 317,344
       L317,318 Q317,308 307,308
       L205,308 Q195,308 195,318
       L195,344 Q195,380 159,380
       L112,380 Q76,380 76,346
       L76,194 Q76,150 120,150 Z"/>
  <!-- Neon cyan outline (stroke only, no fill) -->
  <path fill="none" stroke="#00e5ff" stroke-width="5" filter="url(#neon)"
    d="M120,150 L392,150 Q436,150 436,194
       L436,346 Q436,380 400,380
       L353,380 Q317,380 317,344
       L317,318 Q317,308 307,308
       L205,308 Q195,308 195,318
       L195,344 Q195,380 159,380
       L112,380 Q76,380 76,346
       L76,194 Q76,150 120,150 Z"/>

  <!-- ── Shoulder buttons (L / R) ───────────────────── -->
  <rect x="90"  y="136" width="72" height="17" rx="7" fill="url(#body)"/>
  <rect x="90"  y="136" width="72" height="17" rx="7" fill="none" stroke="#00e5ff" stroke-width="3.5" filter="url(#neon)"/>
  <rect x="350" y="136" width="72" height="17" rx="7" fill="url(#body)"/>
  <rect x="350" y="136" width="72" height="17" rx="7" fill="none" stroke="#00e5ff" stroke-width="3.5" filter="url(#neon)"/>

  <!-- ── D-pad (cyan cross, left side) ──────────────── -->
  <g filter="url(#sg)">
    <rect x="132" y="217" width="56" height="22" rx="5" fill="#00e5ff"/>
    <rect x="149" y="200" width="22" height="56" rx="5" fill="#00e5ff"/>
  </g>

  <!-- ── Face buttons (4 circles, right side) ───────── -->
  <g filter="url(#sg)">
    <!-- Top -->
    <circle cx="349" cy="202" r="13" fill="#00e5ff" fill-opacity="0.12" stroke="#00e5ff" stroke-width="4"/>
    <!-- Right -->
    <circle cx="374" cy="228" r="13" fill="#00e5ff" fill-opacity="0.12" stroke="#00e5ff" stroke-width="4"/>
    <!-- Bottom -->
    <circle cx="349" cy="254" r="13" fill="#00e5ff" fill-opacity="0.12" stroke="#00e5ff" stroke-width="4"/>
    <!-- Left -->
    <circle cx="324" cy="228" r="13" fill="#00e5ff" fill-opacity="0.12" stroke="#00e5ff" stroke-width="4"/>
  </g>

  <!-- ── Centre menu buttons ─────────────────────────── -->
  <rect x="218" y="214" width="28" height="16" rx="8" fill="#00e5ff" fill-opacity="0.13" stroke="#00e5ff" stroke-width="2.5"/>
  <rect x="266" y="214" width="28" height="16" rx="8" fill="#00e5ff" fill-opacity="0.13" stroke="#00e5ff" stroke-width="2.5"/>

  <!-- ── Thumbsticks ─────────────────────────────────── -->
  <!-- Left stick (inside left grip) -->
  <circle cx="136" cy="332" r="29" fill="#0b0a1c" stroke="#00e5ff" stroke-width="5" filter="url(#sg)"/>
  <circle cx="136" cy="332" r="9"  fill="#00e5ff" fill-opacity="0.55"/>
  <!-- Right stick (inside right grip) -->
  <circle cx="376" cy="332" r="29" fill="#0b0a1c" stroke="#00e5ff" stroke-width="5" filter="url(#sg)"/>
  <circle cx="376" cy="332" r="9"  fill="#00e5ff" fill-opacity="0.55"/>
</svg>
